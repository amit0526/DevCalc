<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="Calculator.css" />
    <title>Calculator</title>
  </head>
  <body>
    <div id="calculator">
      <input type="text" id="display" readonly />
      <div class="button-container">
        <button
          class="buttonC"
          onclick="
            currentDisplay = '';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          C
        </button>

        <button
          class="button"
          onclick="
            currentDisplay = currentDisplay + '1';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          1
        </button>

        <button
          class="button"
          onclick="
            currentDisplay = currentDisplay + '2';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          2
        </button>

        <button
          class="button-grey"
          onclick="
            currentDisplay = currentDisplay + '+';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          +
        </button>

        <button
          class="button"
          onclick="
            currentDisplay = currentDisplay + '3';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          3
        </button>

        <button
          class="button"
          onclick="
            currentDisplay = currentDisplay + '4';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          4
        </button>

        <button
          class="button-grey"
          onclick="
            currentDisplay = currentDisplay + '-';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          -
        </button>

        <button
          class="button"
          onclick="
            currentDisplay = currentDisplay + '5';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          5
        </button>

        <button
          class="button"
          onclick="
            currentDisplay = currentDisplay + '6';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          6
        </button>

        <button
          class="button-grey"
          onclick="
            currentDisplay = currentDisplay + '*';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          *
        </button>

        <button
          class="button"
          onclick="
            currentDisplay = currentDisplay + '7';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          7
        </button>

        <button
          class="button"
          onclick="
            currentDisplay = currentDisplay + '8';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          8
        </button>

        <button
          class="button-grey"
          onclick="
            currentDisplay = currentDisplay + '/';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          /
        </button>

        <button class="button-grey"
     onclick="
    try {
      currentDisplay = eval(currentDisplay);
      document.querySelector('#display').value = currentDisplay;
    } catch {
      document.querySelector('#display').value = 'Error';
      currentDisplay = '';
    }
  "
>
  =
</button>

        <button
          class="button"
          onclick="
            currentDisplay = currentDisplay + '9';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          9
        </button>

        <button
          class="button"
          onclick="
            currentDisplay = currentDisplay + '0';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          0
        </button>

        <button
          class="button-grey"
          onclick="
            currentDisplay = currentDisplay + '.';
            document.querySelector('#display').value = currentDisplay;
          "
        >
          .
        </button>

       <button class="button-grey"
    onclick="
    currentDisplay = currentDisplay + '(';
    document.querySelector('#display').value = currentDisplay;
  "
>
  (
</button>

      <button class="button-grey"
  onclick="
    currentDisplay = currentDisplay + ')';
    document.querySelector('#display').value = currentDisplay;
  "
>
  )
</button>

      <button class="button-grey"
       onclick="
       currentDisplay = currentDisplay / 100;
       document.querySelector('#display').value = currentDisplay;
       "
>
      %
      </button>


      </div>
    </div>

    <script src="Calculator.js"></script>
  </body>
</html>
